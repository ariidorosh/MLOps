stages:
  prepare:
    cmd: python src/prepare.py --input data/raw/telco_churn.csv --out-dir data/prepared
    deps:
      - data/raw/telco_churn.csv
      - src/prepare.py
    outs:
      - data/prepared/train.csv
      - data/prepared/test.csv

  train:
    cmd: python -m src.train --mode logreg_c_sweep
    deps:
      - data/prepared/train.csv
      - data/prepared/test.csv
      - src/train.py
      - src/evaluate.py
      - src/config.py
    outs:
      - models/best_model.joblib

  optimize_tpe:
    cmd: python -m src.optimize
    deps:
      - data/prepared/train.csv
      - data/prepared/test.csv
      - src/optimize.py
      - config/config.yaml
      - config/model/logreg.yaml
      - config/hpo/tpe.yaml
    outs:
      - models/best_model_lab3_tpe.joblib
      - models/best_params_lab3_tpe.json
      - reports/resolved_config_lab3_tpe.json

  optimize_random:
    cmd: python -m src.optimize hpo=random
    deps:
      - data/prepared/train.csv
      - data/prepared/test.csv
      - src/optimize.py
      - config/config.yaml
      - config/model/logreg.yaml
      - config/hpo/random.yaml
    outs:
      - models/best_model_lab3_random.joblib
      - models/best_params_lab3_random.json
      - reports/resolved_config_lab3_random.json